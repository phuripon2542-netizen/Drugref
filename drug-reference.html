<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รวมยา A–Z</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ─────────────────────────────────────────── */
:root {
  --bg:        #0d0f14;
  --surface:   #141720;
  --surface2:  #1c2030;
  --border:    #252a3a;
  --accent:    #3d8ef8;
  --accent2:   #5eb8ff;
  --warn:      #f5a623;
  --green:     #4ade80;
  --red:       #f87171;
  --text:      #e2e8f4;
  --muted:     #6b7a99;
  --font:      'IBM Plex Sans Thai', sans-serif;
  --mono:      'IBM Plex Mono', monospace;
  --radius:    8px;
  --trans:     200ms cubic-bezier(.4,0,.2,1);
}

/* ── RESET ───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── LAYOUT ──────────────────────────────────────────── */
.app { display: flex; flex-direction: column; min-height: 100vh; }

/* ── HEADER ─────────────────────────────────────────── */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,15,20,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
}
.header-top {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 12px;
}
.logo {
  font-size: 18px; font-weight: 600; letter-spacing: -.3px;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.logo span { font-weight: 300; }
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--muted); margin-left: auto;
  transition: background var(--trans);
}
.status-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
.status-dot.error { background: var(--red); }

.search-bar {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 7px 12px;
  transition: border-color var(--trans);
}
.search-bar:focus-within { border-color: var(--accent); }
.search-bar input {
  background: none; border: none; outline: none;
  color: var(--text); font-family: var(--font);
  font-size: 13px; width: 100%;
}
.search-bar input::placeholder { color: var(--muted); }
.search-icon { color: var(--muted); font-size: 13px; flex-shrink: 0; }

/* ── AZ NAV ──────────────────────────────────────────── */
.az-nav {
  display: flex; flex-wrap: wrap; gap: 4px;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.az-btn {
  background: none; border: 1px solid var(--border);
  color: var(--muted); font-family: var(--mono);
  font-size: 11px; font-weight: 500;
  padding: 3px 8px; border-radius: 4px;
  cursor: pointer; transition: all var(--trans);
  letter-spacing: .5px;
}
.az-btn:hover { border-color: var(--accent); color: var(--accent2); }
.az-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.az-btn.has-drugs { border-color: #2a3450; color: #8899bb; }
.az-btn:disabled { opacity: .3; cursor: default; }

/* ── MAIN ────────────────────────────────────────────── */
main { flex: 1; padding: 0 20px 40px; }

/* ── LOADING ─────────────────────────────────────────── */
.loading-screen {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 300px; gap: 16px;
}
.spinner {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--muted); font-size: 13px; }

/* ── LETTER SECTION ──────────────────────────────────── */
.letter-section { margin-top: 24px; }
.letter-heading {
  font-family: var(--mono); font-size: 28px; font-weight: 500;
  color: var(--accent); letter-spacing: -1px;
  margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  scroll-margin-top: 140px;
}

/* ── DRUG ITEM ───────────────────────────────────────── */
.drug-item {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 6px;
  overflow: hidden;
  transition: border-color var(--trans);
}
.drug-item:hover { border-color: #2a3860; }

.drug-header {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 14px; cursor: pointer;
  user-select: none;
  transition: background var(--trans);
}
.drug-header:hover { background: var(--surface); }
.drug-header.open { background: var(--surface2); }

.drug-toggle-icon {
  flex-shrink: 0; margin-top: 2px;
  color: var(--muted); font-size: 10px;
  transition: transform var(--trans);
}
.drug-header.open .drug-toggle-icon { transform: rotate(90deg); }

.drug-text { flex: 1; }
.drug-name {
  font-weight: 500; color: var(--accent2);
  font-size: 13.5px; line-height: 1.4;
}
.drug-name .brand {
  font-weight: 400; color: var(--muted);
  font-size: 12px;
}
.drug-detail-line {
  color: #8899bb; font-size: 12.5px; margin-top: 2px;
}
.drug-detail-line .dose { color: var(--text); font-family: var(--mono); font-size: 11.5px; }
.drug-detail-line .indication { color: #7899cc; }
.drug-detail-line .warn-tag {
  color: var(--warn); font-size: 11px;
}
.drug-detail-line .contra {
  color: var(--red); font-size: 11px;
}

/* ── DRUG NOTES (TOGGLE CONTENT) ────────────────────── */
.drug-notes {
  max-height: 0; overflow: hidden;
  transition: max-height .35s cubic-bezier(.4,0,.2,1), padding .2s;
  background: var(--surface);
  border-top: 0 solid var(--border);
}
.drug-notes.open {
  max-height: 2000px;
  border-top-width: 1px;
  padding: 14px 14px 14px 38px;
}
.drug-notes-inner { color: #9aaac8; font-size: 12.5px; line-height: 1.75; }
.drug-notes-inner p { margin-bottom: 8px; }
.drug-notes-inner strong { color: var(--text); font-weight: 500; }
.drug-notes-inner em { color: var(--warn); font-style: normal; }
.drug-notes-inner .note-block {
  background: var(--surface2);
  border-left: 2px solid var(--accent);
  padding: 8px 12px; border-radius: 0 4px 4px 0;
  margin: 8px 0; font-size: 12px;
}
.no-notes { color: var(--muted); font-size: 12px; font-style: italic; }

/* ── TAGS ────────────────────────────────────────────── */
.tag {
  display: inline-block; font-size: 10px;
  padding: 1px 6px; border-radius: 3px;
  margin-left: 6px; vertical-align: middle;
  font-family: var(--mono); letter-spacing: .3px;
}
.tag-ped { background: #1a3a4a; color: #5eb8ff; }
.tag-neo { background: #1a2a4a; color: #93c5fd; }
.tag-warn { background: #3a2a0a; color: var(--warn); }

/* ── EMPTY STATE ─────────────────────────────────────── */
.empty-state {
  text-align: center; padding: 40px 20px;
  color: var(--muted);
}
.empty-icon { font-size: 32px; margin-bottom: 10px; }

/* ── FOOTER ──────────────────────────────────────────── */
footer {
  text-align: center; padding: 16px;
  color: var(--muted); font-size: 11px;
  border-top: 1px solid var(--border);
}
footer a { color: var(--accent); text-decoration: none; }

/* ── SCROLL TO TOP ───────────────────────────────────── */
#scrollTop {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); width: 36px; height: 36px;
  border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; opacity: 0; transition: opacity var(--trans);
  z-index: 50;
}
#scrollTop.visible { opacity: 1; }

/* ── HIGHLIGHT ───────────────────────────────────────── */
mark { background: #1e3a5f; color: var(--accent2); border-radius: 2px; padding: 0 1px; }

/* ── RESPONSIVE ──────────────────────────────────────── */
@media (max-width: 480px) {
  .az-btn { font-size: 10px; padding: 2px 6px; }
}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<header>
  <div class="header-top">
    <div class="logo">รวมยา <span>A–Z</span></div>
    <div class="status-dot" id="statusDot" title="สถานะการเชื่อมต่อ Notion"></div>
  </div>
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="ค้นหายา เช่น amoxicillin, paracetamol..." autocomplete="off" spellcheck="false">
  </div>
</header>

<!-- A-Z NAV -->
<nav class="az-nav" id="azNav">
  <!-- generated by JS -->
</nav>

<!-- MAIN -->
<main id="mainContent">
  <div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <div class="loading-text">กำลังโหลดข้อมูลจาก Notion...</div>
  </div>
</main>

<!-- SCROLL TOP -->
<button id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<footer>
  ข้อมูลซิงค์จาก <a href="https://notion.so" target="_blank">Notion</a> · อัพเดตอัตโนมัติทุกครั้งที่เปิด
</footer>
</div>

<script>
// ============================================================
// CONFIG — แก้ทั้ง 2 ค่านี้
// ============================================================
const WORKER_URL   = "https://YOUR_WORKER_NAME.YOUR_SUBDOMAIN.workers.dev";  // ← URL ของ Cloudflare Worker
const NOTION_PAGE_ID = "3633eb4d-888d-8030-b01c-cc09a88924d0";               // ← Page ID รวมยา

// ============================================================
// STATE
// ============================================================
let allDrugs = [];      // { letter, name, brand, dose, indication, warnings, notes, isPed, isNeo }
let filteredDrugs = []; // after search filter
let activeLetters = new Set();
let openDrugId = null;

// ============================================================
// BOOT
// ============================================================
document.addEventListener("DOMContentLoaded", async () => {
  buildAZNav();
  await loadData();
  document.getElementById("searchInput").addEventListener("input", onSearch);
  window.addEventListener("scroll", () => {
    document.getElementById("scrollTop").classList.toggle("visible", window.scrollY > 300);
  });
});

// ============================================================
// FETCH + PARSE NOTION
// ============================================================
async function loadData() {
  const dot = document.getElementById("statusDot");
  try {
    const blocks = await fetchBlocks(NOTION_PAGE_ID);
    allDrugs = parseBlocks(blocks);
    activeLetters = new Set(allDrugs.map(d => d.letter.toUpperCase()));
    dot.className = "status-dot live";
    filteredDrugs = [...allDrugs];
    renderAll();
  } catch (e) {
    dot.className = "status-dot error";
    document.getElementById("loadingScreen").innerHTML =
      `<div class="empty-icon">⚠️</div><p style="color:#f87171">โหลดข้อมูลไม่สำเร็จ: ${e.message}</p>
       <p style="color:#6b7a99;font-size:12px;margin-top:8px">ตรวจสอบ WORKER_URL และ Notion Integration Token</p>`;
    console.error(e);
  }
}

async function fetchBlocks(pageId) {
  const res = await fetch(`${WORKER_URL}/page/${pageId}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ── PARSER ────────────────────────────────────────────────
// เพจรวมยามีโครงสร้าง:
//   toggle (letter A) → items (bullet/toggle แต่ละยา)
//   toggle (letter B) → items ...
// ────────────────────────────────────────────────────────
function parseBlocks(blocks) {
  const drugs = [];
  let uid = 0;

  for (const block of blocks) {
    // ── Letter toggle (A, B, C, ...)
    if (block.type === "toggle") {
      const letterText = getText(block.toggle.rich_text).trim();
      const letter = letterText.replace(/[^a-zA-Z]/g, "").charAt(0).toUpperCase();
      if (!letter) continue;

      const children = block.children || [];
      for (const child of children) {
        const drug = parseDrugBlock(child, letter, uid++);
        if (drug) drugs.push(drug);
      }
    }
  }
  return drugs;
}

function parseDrugBlock(block, letter, uid) {
  const textTypes = ["bulleted_list_item","numbered_list_item","paragraph","toggle"];
  if (!textTypes.includes(block.type)) return null;

  const raw = getText(block[block.type]?.rich_text || []);
  if (!raw.trim()) return null;

  // Parse: **DrugName** (Brand) dose (Indication; ⚠️ Warning; ❌ Contra)
  const drug = {
    id: `drug-${uid}`,
    letter,
    raw,
    name: "",
    brand: "",
    dose: "",
    route: "",
    indication: "",
    warnings: [],
    isPed: false,
    isNeo: false,
    notes: []   // from children toggles
  };

  // Extract name (bold text before first space after **)
  const boldMatch = raw.match(/\*\*(.+?)\*\*/);
  if (boldMatch) {
    drug.name = boldMatch[1];
  } else {
    // fallback: first word
    drug.name = raw.split(/[\s(]/)[0];
  }

  // Extract brand name in (Brand)
  const brandMatch = raw.match(/\(([^)]+)\)/);
  if (brandMatch) drug.brand = brandMatch[1];

  // Full line after name for display
  drug.displayLine = raw
    .replace(/\*\*/g, "")
    .replace(/⚠️/g, '<span class="warn-tag">⚠️</span>')
    .replace(/❌/g, '<span class="contra">❌</span>');

  // Ped / Neonatal tags
  drug.isPed = /\[Ped\]/i.test(raw);
  drug.isNeo = /\[Neonatal\]/i.test(raw) || /\[Neo\]/i.test(raw);

  // Notes from children (nested toggles = note content)
  const children = block.children || [];
  for (const child of children) {
    const noteTypes = ["toggle","bulleted_list_item","paragraph","numbered_list_item"];
    if (noteTypes.includes(child.type)) {
      const noteText = getText(child[child.type]?.rich_text || []);
      if (noteText.trim()) {
        drug.notes.push(noteText);
        // sub-children
        for (const sub of child.children || []) {
          const subText = getText(sub[sub.type]?.rich_text || []);
          if (subText.trim()) drug.notes.push("  " + subText);
        }
      }
    }
  }

  return drug;
}

function getText(richText) {
  if (!richText) return "";
  return richText.map(r => r.plain_text || "").join("");
}

// ============================================================
// RENDER
// ============================================================
function renderAll() {
  updateAZNav();
  const main = document.getElementById("mainContent");

  // Group by letter
  const byLetter = {};
  for (const d of filteredDrugs) {
    const L = d.letter.toUpperCase();
    if (!byLetter[L]) byLetter[L] = [];
    byLetter[L].push(d);
  }

  if (filteredDrugs.length === 0) {
    main.innerHTML = `<div class="empty-state"><div class="empty-icon">💊</div><p>ไม่พบยาที่ค้นหา</p></div>`;
    return;
  }

  const letters = Object.keys(byLetter).sort();
  main.innerHTML = letters.map(L => `
    <section class="letter-section" id="section-${L}">
      <div class="letter-heading">${L}</div>
      ${byLetter[L].map(d => renderDrug(d)).join("")}
    </section>
  `).join("");

  // attach toggle listeners
  main.querySelectorAll(".drug-header").forEach(h => {
    h.addEventListener("click", () => toggleDrug(h.dataset.id));
  });
}

function renderDrug(d) {
  const tags = [
    d.isPed ? '<span class="tag tag-ped">Ped</span>' : "",
    d.isNeo ? '<span class="tag tag-neo">Neo</span>' : ""
  ].join("");

  const notesHtml = d.notes.length
    ? d.notes.map(n => `<p>${escHtml(n)}</p>`).join("")
    : `<p class="no-notes">ยังไม่มี note — เพิ่มใน toggle ของยานี้ใน Notion แล้ว refresh</p>`;

  return `
<div class="drug-item" id="${d.id}">
  <div class="drug-header" data-id="${d.id}">
    <span class="drug-toggle-icon">▶</span>
    <div class="drug-text">
      <div class="drug-name">${highlightSearch(escHtml(d.name))}${d.brand ? ` <span class="brand">(${escHtml(d.brand)})</span>` : ""}${tags}</div>
      <div class="drug-detail-line">${highlightSearch(d.displayLine)}</div>
    </div>
  </div>
  <div class="drug-notes" id="notes-${d.id}">
    <div class="drug-notes-inner">${notesHtml}</div>
  </div>
</div>`;
}

function toggleDrug(id) {
  const header = document.querySelector(`.drug-header[data-id="${id}"]`);
  const notes  = document.getElementById(`notes-${id}`);
  const isOpen = header.classList.contains("open");

  // close previous
  if (openDrugId && openDrugId !== id) {
    const prev = document.querySelector(`.drug-header[data-id="${openDrugId}"]`);
    const prevNotes = document.getElementById(`notes-${openDrugId}`);
    if (prev) prev.classList.remove("open");
    if (prevNotes) prevNotes.classList.remove("open");
  }

  header.classList.toggle("open", !isOpen);
  notes.classList.toggle("open", !isOpen);
  openDrugId = isOpen ? null : id;
}

// ============================================================
// AZ NAV
// ============================================================
const LETTERS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

function buildAZNav() {
  const nav = document.getElementById("azNav");
  nav.innerHTML = LETTERS.map(L => `
    <button class="az-btn" id="az-${L}" onclick="jumpTo('${L}')">${L}</button>
  `).join("");
}

function updateAZNav() {
  LETTERS.forEach(L => {
    const btn = document.getElementById(`az-${L}`);
    if (!btn) return;
    const hasDrug = activeLetters.has(L) && filteredDrugs.some(d => d.letter.toUpperCase() === L);
    btn.classList.toggle("has-drugs", hasDrug);
    btn.disabled = !hasDrug;
  });
}

function jumpTo(letter) {
  LETTERS.forEach(L => document.getElementById(`az-${L}`)?.classList.remove("active"));
  const btn = document.getElementById(`az-${letter}`);
  if (btn) btn.classList.add("active");
  const section = document.getElementById(`section-${letter}`);
  if (section) section.scrollIntoView({ behavior: "smooth" });
}

// ============================================================
// SEARCH
// ============================================================
let searchQuery = "";
function onSearch(e) {
  searchQuery = e.target.value.trim().toLowerCase();
  if (!searchQuery) {
    filteredDrugs = [...allDrugs];
  } else {
    filteredDrugs = allDrugs.filter(d =>
      d.name.toLowerCase().includes(searchQuery) ||
      d.brand.toLowerCase().includes(searchQuery) ||
      d.raw.toLowerCase().includes(searchQuery)
    );
  }
  openDrugId = null;
  renderAll();
}

function highlightSearch(text) {
  if (!searchQuery) return text;
  const esc = searchQuery.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  return text.replace(new RegExp(`(${esc})`, "gi"), "<mark>$1</mark>");
}

function escHtml(str) {
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
</script>
</body>
</html>
